# Nginx configuration for Avashya Drop Web Tier (Port 5000)
# To use: nginx -c /path/to/c:/Users/nishad/Desktop/AvashyaApp#1/frontend/nginx.conf

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen       5000;
        server_name  localhost;

        # Serve Web Tier Static HTML / JS / CSS (S3 Pattern)
        location / {
            root   "c:/Users/nishad/Desktop/AvashyaApp#1/frontend";
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # Reverse Proxy /api/ requests to FastAPI REST API on Port 8000
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Avashya Drop</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #334155;
        }

        .brand-badge {
            background: linear-gradient(135deg, #0284c7, #6366f1);
            color: #ffffff;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .card-custom {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .footer-custom {
            margin-top: auto;
            background-color: #0b0f19;
            border-top: 1px solid #334155;
            padding: 24px 0;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top py-2">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
                <i class="bi bi-cloud-arrow-up-fill text-info fs-4"></i>
                <span class="fw-bold tracking-tight">Avashya Drop</span>
                <span class="brand-badge ms-1">WEB TIER (PORT 5000)</span>
            </a>
            
            <div class="ms-auto d-flex align-items-center gap-2">
                <a href="/login.html" class="btn btn-outline-light btn-sm">Log In</a>
                <a href="/register.html" class="btn btn-info btn-sm">Register</a>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container py-4">
        <div class="row justify-content-center my-5">
            <div class="col-md-5">
                <div class="card card-custom p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill text-info display-5"></i>
                        <h3 class="fw-bold mt-2 text-light">Register Developer Account</h3>
                        <p class="text-secondary small">Create an account to test stateless identity mapping</p>
                    </div>

                    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="username" class="form-label text-light fw-medium">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control bg-dark text-light border-secondary" id="username" name="username" placeholder="e.g. intern_dev" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label text-light fw-medium">Avashya Work Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control bg-dark text-light border-secondary" id="email" name="email" placeholder="dev@avashya.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-light fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control bg-dark text-light border-secondary" id="password" name="password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-info w-100 py-2 fw-semibold">
                            <i class="bi bi-check-circle-fill me-1"></i> Register Account
                        </button>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top border-secondary">
                        <p class="text-secondary mb-0 small">Already registered?</p>
                        <a href="/login.html" class="text-info fw-semibold text-decoration-none">Log In to Existing Account</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-custom">
        <div class="container text-center">
            <p class="mb-0 fw-semibold text-light">Avashya Engineering Intern Showcase</p>
            <small>Decoupled Architecture: Web Tier (Port 5000 / S3 Pattern) &rarr; REST API (Port 8000)</small>
        </div>
    </footer>

    <!-- Config & JS Logic -->
    <script src="/config.js"></script>
    <script>
        const API_BASE = window.API_BASE || 'http://127.0.0.1:8000/api';

        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('registerForm');
            const alertBox = document.getElementById('alertBox');

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertBox.classList.add('d-none');

                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                try {
                    const res = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, email, password })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.detail || 'Registration failed');
                    }
                    localStorage.setItem('access_token', data.access_token || data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/index.html?msg=Account+created+successfully';
                } catch (err) {
                    alertBox.textContent = err.message;
                    alertBox.classList.remove('d-none');
                }
            });
        });
    </script>
</body>
</html>
